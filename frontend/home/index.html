<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Главная</title>
  <link rel="stylesheet" href="/static/common/normalization.css?v=4">
  <link rel="stylesheet" href="/static/home/style.css?v=4">
</head>
<body>
  
  <nav>
    <button class="active" data-type="account">Аккаунт</button>
    <button data-type="enter-room">Войти в комнату</button>
    <button data-type="create-room">Создать комнату</button>
    <button data-type="settings">Настройки</button>
  </nav>
  
  <section class="active account" data-type="section-account">
    <h2>Аккаунт</h2>
    
    <div class="row">
      <div class="title">Имя</div>
      <div class="data nick">ㅤ</div>
    </div>
    
    <div class="row">
      <div class="title">id</div>
      <div class="data id">ㅤ</div>
    </div>
    
    <div class="row">
      <div class="title">Дата создания UTC</div>
      <div class="data created-at">ㅤ</div>
    </div>
    
    <div class="account-actions">
      <button class="exit">Выйти</button>
      <button class="del-account">Удалить</button>
    </div>
  </section>
  
  <section data-type="section-enter-room">
    <h2>Скоро</h2>
  </section>
  
  <section data-type="section-create-room">
    
    <form class="create-room-form" novalidate>
      <h2>Создать комнату</h2>
    
      <label class="row name">
        <div class="title">Название</div>
        <input 
          type="text" 
          required 
          minlength="3" 
          maxlength="64" 
          pattern="^[A-Za-z0-9_]+$"
          placeholder="Моя крутая комната"/>
      </label>
      
      <div class="type-room">
        <label>
          <div>Публичная</div>
          <input type="radio" name="type-room" value="public" checked/>
        </label>
        
        <label>
          <div>Приватная</div>
          <input type="radio" name="type-room" value="private" />
        </label>
      </div>
    
      <button type="submit" class="create">Создать</button>
    </form>
    
  </section>
  
  <section data-type="section-settings">
    <h2>Скоро</h2>
  </section>
  
  <section class="modal-window">
  </section>
  
  <!--<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>-->

  <script src="/static/home/js/nav.js"></script>
  <script src="/static/home/js/fetchDataUser.js"></script>
  <script src="/static/home/js/exitAccount.js"></script>
  <script src="/static/home/js/delAccount.js"></script>
  <script src="/static/home/js/creationRoom.js?v=1"></script>
</body>
</html>
