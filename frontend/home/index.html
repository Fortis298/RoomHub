</head>
<body>
  
  <nav>
    <img src="/static/home/img/logo.png"/>
    <div>
      <button class="active" data-type="account">

        </svg>
      </button>
      <button data-type="enter-room">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="img">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </button>
      <button data-type="create-room">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="img">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="img">

      </button>
    </div>
  </nav>
  
    <section class="active account" data-type="section-account">
    <h2>Аккаунт</h2>

    <div class="row">
      <div class="title">Имя</div>
      <div class="data nick">ㅤ</div>
    </div>

    <div class="row">
      <div class="title">id</div>
      <div class="data id">ㅤ</div>
    </div>

    <div class="row">
      <div class="title">Дата создания UTC</div>
      <div class="data created-at">ㅤ</div>
    </div>

    <div class="account-actions">
      <button class="exit">Выйти</button>
      <button class="del-account">Удалить</button>
    </div>
  </section>

  <section data-type="section-enter-room">
    <h2>Ваши комнаты</h2>
    <section class="you-rooms"></section>
  </section>

  <section data-type="section-create-room">

    <form class="create-room-form" novalidate>
      <h2>Создать комнату</h2>

      <label class="row name">
        <div class="title">Название</div>
        <input 
          type="text" 
          required 
          minlength="3" 
          maxlength="64" 
          pattern="^[A-Za-z0-9_]+$"
          placeholder="Моя крутая комната"/>
      </label>

      <div class="type-room">
        <label>
          <div>Публичная</div>
          <input type="radio" name="type-room" value="public" checked/>
        </label>

        <label>
          <div>Приватная</div>
          <input type="radio" name="type-room" value="private" />
        </label>
      </div>

      <button type="submit" class="create">Создать</button>
    </form>

  </section>

  <section data-type="section-settings">
    <h2>Скоро</h2>
  </section>

  <section class="modal-window">
  </section>
  
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <script src="/static/home/js/nav.js?v=6"></script>
  <script src="/static/home/js/fetchDataUser.js?v=9"></script>
  <script src="/static/home/js/exitAccount.js?v=6"></script>
  <script src="/static/home/js/delAccount.js?v=6"></script>
  <script src="/static/home/js/creationRoom.js?v=6"></script>
</body>
</html>
