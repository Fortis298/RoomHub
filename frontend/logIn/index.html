<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход</title>
  <link rel="stylesheet" href="/static/common/normalization.css">
  <link rel="stylesheet" href="/static/logIn/style.css">
</head>
<body>
  
    <header>
    <a href="/logIn" class="active">Вход</a>
    <a href="/signUp">Регистрация</a>
  </header>
  
  <form novalidate>
    <h1>Мы скучали!</h1>
    <h2>Войдите, чтобы продолжить</h2>
    
    <label class="nick">
      <div>Имя</div>
      <input 
        type="text" 
        required 
        minlength="3" 
        maxlength="64" 
        pattern="^[A-Za-z0-9_]+$"
        placeholder="Напомните как вас зовут?">
    </label>
    
    <label class="password">
      <div>Пароль</div>
      <input 
        required
        type="text" 
        placeholder="Это точно вы?"
        minlength="8"
        maxlength="64">
    </label>
    
    <button type="submit">Войти</button>
  </form>

  <script src="/static/logIn/main.js"></script>
</body>
</html>
